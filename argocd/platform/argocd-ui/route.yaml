# Expose l'UI/API ArgoCD via Traefik Gateway API. Necessite server.insecure=true
# dans argocd-cmd-params-cm : voir la cible `make argocd-ingress`.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: default
  hostnames:
    - argocd.192.168.33.100.nip.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argocd-server
          port: 80
