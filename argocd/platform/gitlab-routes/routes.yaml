apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gitlab-webservice
  namespace: gitlab
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: default
  hostnames:
    - gitlab.192.168.33.100.nip.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: gitlab-webservice-default
          port: 8181
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gitlab-kas
  namespace: gitlab
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: default
  hostnames:
    - kas.192.168.33.100.nip.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: gitlab-kas
          port: 8150
