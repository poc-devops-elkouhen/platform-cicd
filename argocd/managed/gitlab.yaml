apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitlab
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.gitlab.io/
    chart: gitlab
    targetRevision: 9.11.6
    helm:
      # Valeurs allégées, adaptées d'examples/values-minikube-minimum.yaml du chart
      # officiel, pour faire tourner GitLab sur un cluster k3d local mono-noeud.
      values: |
        global:
          kas:
            enabled: true
          hosts:
            domain: 192.168.33.100.nip.io
            kas:
              name: kas.192.168.33.100.nip.io
            # Pas de TLS sur ce cluster local (pas de cert-manager) : sans ce flag,
            # le chart force `https: true` dans gitlab.yml, ce qui marque le cookie
            # de session "Secure" et le rend impossible à renvoyer en HTTP, faisant
            # échouer toute requête POST (login compris) avec un 422 CSRF.
            https: false
          ingress:
            enabled: false
            class: ""
            configureCertmanager: false
          rails:
            bootsnap:
              enabled: false
        installCertmanager: false
        certmanager-issuer:
          email: admin@gitlab.local
        # ArgoCD exécute les hooks "pre-upgrade" dès le premier sync (il ne distingue
        # pas install vs upgrade comme le ferait `helm install`), ce qui fait échouer
        # ce job sur un cluster neuf faute de ConfigMap "chart-info" préexistante.
        upgradeCheck:
          enabled: false
        nginx-ingress:
          enabled: false
        prometheus:
          install: false
        # Le token d'authentification du runner n'est pas en clair ici : il est
        # généré dynamiquement via l'API GitLab par `make gitlab-runner-token`
        # (scripts/gitlab-runner-token.sh) et stocké dans le Secret K8s
        # gitlab-gitlab-runner-secret effectivement monté par le chart.
        gitlab-runner:
          install: true
          gitlabUrl: http://gitlab-webservice-default.gitlab.svc.cluster.local:8181/
          rbac:
            create: true
          runners:
            config: |
              [[runners]]
                # Le serveur renvoie l'URL externe (gitlab.192.168.33.100.nip.io) pour le
                # clone, injoignable depuis l'intérieur du cluster (127.0.0.1 = le pod
                # lui-même) : on force l'URL in-cluster utilisée pour le `git clone`.
                clone_url = "http://gitlab-webservice-default.gitlab.svc.cluster.local:8181"
                [runners.kubernetes]
                  namespace = "{{.Release.Namespace}}"
                  image = "alpine:latest"
                  # Le nœud est arm64 (Apple Silicon) ; sans cette valeur explicite,
                  # le runner essaie de tirer le helper en x86_64 et échoue.
                  helper_image = "registry.gitlab.com/gitlab-org/gitlab-runner/gitlab-runner-helper:arm64-v18.11.2"
                  cpu_request = "100m"
                  memory_request = "128Mi"
                  cpu_limit = "1"
                  memory_limit = "1Gi"
        registry:
          enabled: false
        gitlab-pages:
          enabled: false
        gitlab:
          webservice:
            minReplicas: 1
            maxReplicas: 1
          sidekiq:
            minReplicas: 1
            maxReplicas: 1
            # 1Gi (valeur d'origine, inspirée de values-minikube-minimum.yaml) est
            # trop juste pour sidekiq-ee : OOMKilled (137) systématique au boot,
            # alors que webservice (même appli Rails) consomme ~2.7Gi en régime
            # établi sur ce cluster.
            resources:
              requests:
                cpu: 100m
                memory: 768Mi
              limits:
                memory: 2Gi
          gitlab-shell:
            minReplicas: 1
            maxReplicas: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: gitlab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
