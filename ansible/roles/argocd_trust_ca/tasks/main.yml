---
- name: Attendre {{ trust_ca_deployment }} avant extraction CA
  ansible.builtin.command: >-
    kubectl -n {{ trust_ca_namespace }} rollout status deployment {{ trust_ca_deployment }}
    --timeout={{ trust_ca_wait_timeout }}
  changed_when: false

- name: Créer un répertoire temporaire
  ansible.builtin.tempfile:
    state: directory
    prefix: trust-ca-
  register: trust_ca_tmpdir

- name: Extraire le certificat CA additionnel
  ansible.builtin.shell: "{{ trust_ca_extra_cert_command }} > {{ trust_ca_tmpdir.path }}/extra-ca.pem"
  changed_when: false

- name: Récupérer le nom du pod {{ trust_ca_deployment }}
  ansible.builtin.command: >-
    kubectl -n {{ trust_ca_namespace }} get pods
    -l app.kubernetes.io/name={{ trust_ca_deployment }}
    -o jsonpath='{.items[0].metadata.name}'
  register: trust_ca_pod
  changed_when: false

- name: Extraire le bundle CA système du pod
  ansible.builtin.shell: >-
    kubectl -n {{ trust_ca_namespace }} exec {{ trust_ca_pod.stdout }}
    {{ '-c ' + trust_ca_container if trust_ca_container else '' }}
    -- cat /etc/ssl/certs/ca-certificates.crt > {{ trust_ca_tmpdir.path }}/system-ca-bundle.crt
  changed_when: false

- name: Fusionner le bundle CA
  ansible.builtin.shell: >-
    cat {{ trust_ca_tmpdir.path }}/system-ca-bundle.crt {{ trust_ca_tmpdir.path }}/extra-ca.pem
    > {{ trust_ca_tmpdir.path }}/merged-ca-bundle.crt
  changed_when: false

- name: Créer/mettre à jour le ConfigMap {{ trust_ca_configmap }}
  ansible.builtin.shell: |
    set -o pipefail
    kubectl -n {{ trust_ca_namespace }} create configmap {{ trust_ca_configmap }} \
      --from-file=ca-certificates.crt={{ trust_ca_tmpdir.path }}/merged-ca-bundle.crt \
      --dry-run=client -o yaml | kubectl apply -f -
  register: trust_ca_configmap_apply
  changed_when: "'unchanged' not in trust_ca_configmap_apply.stdout"

- name: Patcher {{ trust_ca_deployment }} avec le ConfigMap CA
  ansible.builtin.command: >-
    kubectl -n {{ trust_ca_namespace }} patch deployment {{ trust_ca_deployment }}
    --type strategic --patch-file {{ trust_ca_patch_file }}
  register: trust_ca_patch
  changed_when: "'(no change)' not in trust_ca_patch.stdout"

- name: Attendre {{ trust_ca_deployment }} après patch
  ansible.builtin.command: >-
    kubectl -n {{ trust_ca_namespace }} rollout status deployment {{ trust_ca_deployment }}
    --timeout={{ trust_ca_wait_timeout }}
  changed_when: false

- name: Nettoyer le répertoire temporaire
  ansible.builtin.file:
    path: "{{ trust_ca_tmpdir.path }}"
    state: absent
