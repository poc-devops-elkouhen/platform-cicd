---
- name: Bootstrap ArgoCD, Flux et GitLab sur le cluster courant
  hosts: local
  gather_facts: false
  vars:
    argocd_namespace: argocd
    argocd_version: v3.4.4
    argocd_wait_timeout: 600s
    corporate_ca_label: Zscaler
    flux_namespace: flux-system
    sops_age_key_file: "{{ lookup('env', 'HOME') }}/.config/sops/age/keys.txt"
    gitlab_domain: 192.168.33.100.nip.io
    gitlab_namespace: gitlab
    gitlab_ready_timeout: 600
    gitlab_url: "https://gitlab.{{ gitlab_domain }}"
    argocd_url: "https://argocd.{{ gitlab_domain }}"
    argocd_install_filter: "{{ playbook_dir }}/../scripts/filter-argocd-install.py"
    argocd_install_url: "https://raw.githubusercontent.com/argoproj/argo-cd/{{ argocd_version }}/manifests/install.yaml"

  # L'ordre des tasks ci-dessous porte la séquence de bootstrap (autrefois
  # rejouée par scripts/run-bootstrap.py en appelant `make <étape>` en
  # boucle). Un seul `ansible-playbook --tags <étapes>` suffit maintenant à
  # exécuter la séquence complète, dans l'ordre déclaré ici.
  tasks:
    - name: Installer ArgoCD
      tags: [argocd-install]
      block:
        - name: Créer le namespace ArgoCD
          ansible.builtin.shell: |
            set -o pipefail
            kubectl create namespace {{ argocd_namespace }} --dry-run=client -o yaml | kubectl apply -f -
          register: argocd_ns_apply
          changed_when: "'unchanged' not in argocd_ns_apply.stdout"

        # Manifest multi-ressources (CRDs, Deployments, RBAC...) : la sortie
        # mélange created/configured/unchanged par ressource, donc un simple
        # test de sous-chaîne ne peut pas déterminer un changed/pas-changed
        # fiable pour l'ensemble. On assume "changed" à chaque exécution
        # plutôt que de rapporter un faux "pas de changement".
        - name: Appliquer le manifest ArgoCD filtré
          ansible.builtin.shell: |
            set -o pipefail
            python3 {{ argocd_install_filter }} "{{ argocd_install_url }}" \
              | kubectl apply --server-side --force-conflicts -n {{ argocd_namespace }} -f -
          register: argocd_install_apply

    - name: Faire confiance au CA corporate pour argocd-repo-server
      tags: [argocd-trust-corporate-ca]
      ansible.builtin.include_role:
        name: argocd_trust_ca
        apply:
          tags: [argocd-trust-corporate-ca]
      vars:
        trust_ca_namespace: "{{ argocd_namespace }}"
        trust_ca_wait_timeout: "{{ argocd_wait_timeout }}"
        trust_ca_deployment: argocd-repo-server
        trust_ca_configmap: argocd-repo-server-ca-bundle
        trust_ca_patch_file: "{{ playbook_dir }}/../argocd/repo-server-ca-patch.yaml"
        trust_ca_extra_cert_command: >-
          security find-certificate -a -c "{{ corporate_ca_label }}" -p /Library/Keychains/System.keychain

    - name: Faire confiance au CA de la Gateway locale pour argocd-dex-server
      tags: [argocd-trust-local-gateway-ca]
      ansible.builtin.include_role:
        name: argocd_trust_ca
        apply:
          tags: [argocd-trust-local-gateway-ca]
      vars:
        trust_ca_namespace: "{{ argocd_namespace }}"
        trust_ca_wait_timeout: "{{ argocd_wait_timeout }}"
        trust_ca_deployment: argocd-dex-server
        trust_ca_container: dex
        trust_ca_configmap: argocd-dex-ca-bundle
        trust_ca_patch_file: "{{ playbook_dir }}/../argocd/dex-ca-patch.yaml"
        trust_ca_extra_cert_command: >-
          kubectl -n default get secret nip-io-wildcard-tls -o jsonpath='{.data.tls\.crt}' | base64 -d

    - name: Appliquer le root Application ArgoCD
      tags: [argocd-bootstrap]
      block:
        - name: Attendre le CRD Application
          ansible.builtin.command: >-
            kubectl wait --for=condition=Established crd/applications.argoproj.io
            --timeout={{ argocd_wait_timeout }}
          changed_when: false

        - name: Appliquer argocd/root-app.yaml
          ansible.builtin.command: >-
            kubectl apply -n {{ argocd_namespace }}
            -f {{ playbook_dir }}/../argocd/root-app.yaml
          register: root_app_apply
          changed_when: "'unchanged' not in root_app_apply.stdout"

    - name: Injecter la clé age SOPS pour Flux
      tags: [flux-sops-age]
      block:
        - name: Vérifier que la clé age existe
          ansible.builtin.stat:
            path: "{{ sops_age_key_file }}"
          register: sops_age_key_stat

        - name: Échouer si la clé age est introuvable
          ansible.builtin.fail:
            msg: "sops_age_key_file={{ sops_age_key_file }} introuvable"
          when: not sops_age_key_stat.stat.exists

        - name: Créer le namespace flux-system
          ansible.builtin.shell: |
            set -o pipefail
            kubectl create namespace {{ flux_namespace }} --dry-run=client -o yaml | kubectl apply -f -
          register: flux_ns_apply
          changed_when: "'unchanged' not in flux_ns_apply.stdout"

        - name: Créer le Secret sops-age
          ansible.builtin.shell: |
            set -o pipefail
            kubectl create secret generic sops-age \
              --namespace {{ flux_namespace }} \
              --from-file=age.agekey={{ sops_age_key_file }} \
              --dry-run=client -o yaml | kubectl apply -f -
          register: sops_age_secret_apply
          changed_when: "'unchanged' not in sops_age_secret_apply.stdout"

    - name: Configurer ArgoCD en HTTP (bootstrap uniquement)
      tags: [argocd-ingress]
      block:
        - name: Attendre argocd-server
          ansible.builtin.command: >-
            kubectl -n {{ argocd_namespace }} rollout status deployment argocd-server
            --timeout={{ argocd_wait_timeout }}
          changed_when: false

        - name: Patcher server.insecure=true
          ansible.builtin.command: >-
            kubectl -n {{ argocd_namespace }} patch configmap argocd-cmd-params-cm
            --type merge -p '{"data":{"server.insecure":"true"}}'
          register: argocd_ingress_patch
          changed_when: "'no change' not in argocd_ingress_patch.stdout"

        - name: Redémarrer argocd-server
          ansible.builtin.command: kubectl -n {{ argocd_namespace }} rollout restart deployment argocd-server
          when: argocd_ingress_patch.changed

        - name: Attendre argocd-server après redémarrage
          ansible.builtin.command: >-
            kubectl -n {{ argocd_namespace }} rollout status deployment argocd-server
            --timeout={{ argocd_wait_timeout }}
          when: argocd_ingress_patch.changed

    - name: Créer le PAT GitLab et le Secret K8s pour Terraform
      tags: [gitlab-tf-credentials]
      ansible.builtin.command: "python3 {{ playbook_dir }}/../scripts/gitlab-tf-credentials.py"
      environment:
        GITLAB_NAMESPACE: "{{ gitlab_namespace }}"
        FLUX_NAMESPACE: "{{ flux_namespace }}"
        GITLAB_URL: "{{ gitlab_url }}"
        GITLAB_READY_TIMEOUT: "{{ gitlab_ready_timeout }}"

    - name: Créer l'application OAuth GitLab pour Dex
      tags: [gitlab-dex-oauth-app]
      ansible.builtin.command: "python3 {{ playbook_dir }}/../scripts/gitlab-dex-oauth-app.py"
      environment:
        GITLAB_NAMESPACE: "{{ gitlab_namespace }}"
        ARGOCD_NAMESPACE: "{{ argocd_namespace }}"
        GITLAB_URL: "{{ gitlab_url }}"
        ARGOCD_URL: "{{ argocd_url }}"
        GITLAB_READY_TIMEOUT: "{{ gitlab_ready_timeout }}"

    - name: Créer le Secret K8s du token runner GitLab
      tags: [gitlab-runner-token]
      ansible.builtin.command: "python3 {{ playbook_dir }}/../scripts/gitlab-runner-token.py"
      environment:
        GITLAB_NAMESPACE: "{{ gitlab_namespace }}"
        GITLAB_URL: "{{ gitlab_url }}"
        GITLAB_READY_TIMEOUT: "{{ gitlab_ready_timeout }}"
